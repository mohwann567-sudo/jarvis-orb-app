<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>JARVIS orb — component</title>
<style>
  :root{ --bg:transparent; }   /* set to transparent in the Tauri shell */
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}
  #gl{display:block;width:100vw;height:100vh}

  /* --- confirm controls (prototype only; the shell drives these via the bridge) --- */
  #hud{
    position:fixed;left:50%;bottom:20px;transform:translateX(-50%);
    display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center;
    max-width:94vw;padding:7px;border-radius:13px;
    font:500 11px/1 'JetBrains Mono',ui-monospace,monospace;letter-spacing:.1em;
    color:#bfe9ff;background:rgba(8,16,26,.55);
    border:1px solid rgba(120,200,255,.16);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    box-shadow:0 8px 30px rgba(0,0,0,.5);z-index:10;
    transition:opacity .25s ease,transform .25s ease;
  }
  #hud.hide{opacity:0;transform:translate(-50%,12px);pointer-events:none}
  #hud .grp{display:flex;gap:4px;align-items:center}
  #hud .lbl{opacity:.5;text-transform:uppercase;padding:0 4px}
  #hud button{
    font:inherit;text-transform:uppercase;color:#9fdcff;cursor:pointer;
    background:transparent;border:1px solid rgba(120,200,255,.18);
    padding:7px 10px;border-radius:8px;
    transition:background .15s,border-color .15s,color .15s;
  }
  #hud button:hover{background:rgba(120,200,255,.12);border-color:rgba(120,200,255,.4)}
  #hud button.on{background:rgba(120,200,255,.22);color:#fff;border-color:rgba(150,225,255,.7)}
  #hud .dot{width:9px;height:9px;border-radius:50%;border:1px solid rgba(255,255,255,.25)}
  #hud .sep{width:1px;height:20px;background:rgba(120,200,255,.18);margin:0 2px}
  #hud input[type=range]{width:96px;accent-color:#7eecff}
  #peek{position:fixed;right:13px;bottom:12px;z-index:11;border:none;background:none;cursor:pointer;
    font:500 10px/1 'JetBrains Mono',monospace;letter-spacing:.1em;color:rgba(159,220,255,.35)}
  #peek:hover{color:rgba(159,220,255,.85)}
</style>
</head>
<body>
  <canvas id="gl" data-tauri-drag-region></canvas>

  <div id="hud">
    <span class="lbl">energy</span>
    <div class="grp">
      <button data-e="idle" class="on">Idle</button>
      <button data-e="speak">Speaking</button>
      <button data-e="live">Live</button>
    </div>
    <input id="eSlider" type="range" min="0" max="1" step="0.01" value="0.22" />
    <div class="sep"></div>
    <span class="lbl">agent</span>
    <div class="grp" id="agents"></div>
    <div class="sep"></div>
    <button id="hideBtn">Hide</button>
  </div>
  <button id="peek">controls</button>

<script type="module">
import * as THREE from 'three';
(() => {
  "use strict";

  // ---- agent palettes (hue, sat) — straight from ORB_SPEC ----------------
  const AGENTS = {
    jarvis:  {hue:0.58, sat:0.85, name:'Jarvis'},
    trader:  {hue:0.33, sat:0.80, name:'Trader'},
    etsy:    {hue:0.06, sat:0.88, name:'Etsy'},
    funeral: {hue:0.72, sat:0.72, name:'Funeral'},
    content: {hue:0.10, sat:0.92, name:'Content'},
  };
  const IDLE = 0.22, SPEAK = 0.85;   // locked tuning

  // ---- three.js: fullscreen quad + fragment shader -----------------------
  const canvas = document.getElementById('gl');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:false, premultipliedAlpha:false });
  renderer.setClearColor(0x000000, 0);   // transparent — additive glow over whatever's behind
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

  const uniforms = {
    u_time:   { value: 0 },
    u_res:    { value: new THREE.Vector2() },
    u_energy: { value: IDLE },
    u_hue:    { value: AGENTS.jarvis.hue },
    u_sat:    { value: AGENTS.jarvis.sat },
  };

  const vert = `
    void main(){ gl_Position = vec4(position.xy, 0.0, 1.0); }
  `;

  const frag = `
    precision highp float;
    uniform vec2  u_res;
    uniform float u_time;
    uniform float u_energy;
    uniform float u_hue;
    uniform float u_sat;

    // --- Ashima simplex noise (2D), returns ~[-1,1] ---
    vec3 mod289(vec3 x){ return x - floor(x*(1.0/289.0))*289.0; }
    vec2 mod289(vec2 x){ return x - floor(x*(1.0/289.0))*289.0; }
    vec3 permute(vec3 x){ return mod289(((x*34.0)+1.0)*x); }
    float snoise(vec2 v){
      const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                         -0.577350269189626, 0.024390243902439);
      vec2 i  = floor(v + dot(v, C.yy));
      vec2 x0 = v -   i + dot(i, C.xx);
      vec2 i1 = (x0.x > x0.y) ? vec2(1.0,0.0) : vec2(0.0,1.0);
      vec4 x12 = x0.xyxy + C.xxzz; x12.xy -= i1;
      i = mod289(i);
      vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0))
                              + i.x + vec3(0.0, i1.x, 1.0));
      vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
      m = m*m; m = m*m;
      vec3 x = 2.0*fract(p*C.www) - 1.0;
      vec3 h = abs(x) - 0.5;
      vec3 ox = floor(x + 0.5);
      vec3 a0 = x - ox;
      m *= 1.79284291400159 - 0.85373472095314*(a0*a0 + h*h);
      vec3 g;
      g.x  = a0.x*x0.x + h.x*x0.y;
      g.yz = a0.yz*x12.xz + h.yz*x12.yw;
      return 130.0*dot(m, g);
    }

    // fractal brownian motion, remapped to [0,1]
    float fbm(vec2 p){
      float v = 0.0, a = 0.5;
      mat2 m = mat2(1.6, 1.2, -1.2, 1.6);
      for(int i=0;i<5;i++){ v += a*snoise(p); p = m*p; a *= 0.5; }
      return v*0.5 + 0.5;
    }

    // ridged filaments: ridge() = 1-abs(fbm*2-1), softened with pow ~2.8
    float ridge(float n){ n = 1.0 - abs(n*2.0 - 1.0); return pow(n, 2.8); }

    vec3 hsv2rgb(vec3 c){
      vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
      vec3 p = abs(fract(c.xxx + K.xyz)*6.0 - K.www);
      return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
    }

    void main(){
      vec2 uv = (gl_FragCoord.xy - 0.5*u_res) / min(u_res.x, u_res.y);
      uv *= 2.0;
      float r = length(uv);
      float e = u_energy;
      float t = u_time;

      // one energy term drives pulse, rotation, tendrils, core, glow together
      float pulse = 0.5 + 0.5*sin(t*(1.0 + e*3.0));

      float ang = t*(0.14 + e*0.5);
      float cs = cos(ang), sn = sin(ang);
      vec2 p = mat2(cs,-sn,sn,cs) * uv;

      // domain warp (0.6)
      vec2 w = vec2(fbm(p*1.2 + vec2(0.0, t*0.10)),
                    fbm(p*1.2 + vec2(t*0.12, 0.0)));
      p += 0.6*(w - 0.5);

      // slower swirl layer underneath
      float swirl = fbm(p*1.0 - vec2(t*0.05, t*0.03));

      // ridged filaments over the swirl
      float fil = ridge( fbm(p*3.4 + swirl*0.6) );
      float disc = smoothstep(1.5, 0.2, r);
      fil *= disc;
      fil *= (0.42 + e*1.30) * (0.7 + 0.3*pulse);
      fil += swirl*disc*0.15*(0.4 + e);

      // tight hot-white core
      float core = pow(smoothstep(0.32, 0.0, r), 1.6);
      core *= (0.85 + e*0.7 + 0.25*pulse);

      // soft halo
      float halo = exp(-r*2.2) * (0.25 + e*0.55);

      float intensity = fil + halo;

      vec3 base = hsv2rgb(vec3(u_hue, u_sat, 1.0));
      vec3 c = base*intensity + base*core*1.4;
      c = mix(c, vec3(1.0), clamp(core*1.1, 0.0, 1.0));   // hot-white center

      // additive bloom tonemap (capped, in-shader)
      c = c/(1.0 + c*0.5);
      c = pow(c, vec3(0.9));

      gl_FragColor = vec4(c, clamp(intensity + core, 0.0, 1.0));
    }
  `;

  const material = new THREE.ShaderMaterial({
    uniforms, vertexShader: vert, fragmentShader: frag,
    transparent: true, blending: THREE.AdditiveBlending,
    depthTest: false, depthWrite: false,
  });
  scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), material));

  function resize(){
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h, false);
    const pr = renderer.getPixelRatio();
    uniforms.u_res.value.set(w*pr, h*pr);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---- energy easing (lerp 0.06 toward target) — the public control ------
  let energyTarget = IDLE;
  let liveMode = false;
  const clock = new THREE.Clock();

  // public API the shell/bridge will call:
  window.orb = {
    setEnergy(v){ energyTarget = Math.max(0, Math.min(1, +v||0)); },
    setAgent(key){ const a = AGENTS[key]; if(a){ uniforms.u_hue.value=a.hue; uniforms.u_sat.value=a.sat; } },
    setHueSat(h,s){ uniforms.u_hue.value=h; uniforms.u_sat.value=s; },
  };

  function frame(){
    const tt = clock.getElapsedTime();
    uniforms.u_time.value = tt;
    if(liveMode){
      // smooth speech-like envelope: layered sines, never snaps, stays "alive"
      const env = 0.60 + 0.15*Math.sin(tt*6.0)
                       + 0.08*Math.sin(tt*10.7 + 1.1)
                       + 0.05*Math.sin(tt*2.3 + 0.5);
      energyTarget = Math.min(0.85, Math.max(0.45, env));
      slider.value = energyTarget.toFixed(2);
    }
    uniforms.u_energy.value += (energyTarget - uniforms.u_energy.value) * 0.06;
    renderer.render(scene, camera);
    requestAnimationFrame(frame);
  }
  frame();

  // =======================================================================
  // prototype confirm controls (not part of the shipped component)
  // =======================================================================
  const hud = document.getElementById('hud');
  const slider = document.getElementById('eSlider');
  const eBtns = hud.querySelectorAll('button[data-e]');

  function setMode(mode){
    eBtns.forEach(b=>b.classList.toggle('on', b.dataset.e===mode));
    liveMode = (mode==='live');
    if(mode==='idle'){ window.orb.setEnergy(IDLE); slider.value=IDLE; }
    else if(mode==='speak'){ window.orb.setEnergy(SPEAK); slider.value=SPEAK; }
    // 'live' is handled smoothly inside the frame loop
  }
  eBtns.forEach(b=> b.addEventListener('click', ()=> setMode(b.dataset.e)));
  slider.addEventListener('input', ()=>{
    liveMode = false; eBtns.forEach(b=>b.classList.remove('on'));
    window.orb.setEnergy(parseFloat(slider.value));
  });

  // agent swatches
  const agentsEl = document.getElementById('agents');
  Object.entries(AGENTS).forEach(([key,a],i)=>{
    const b = document.createElement('button');
    b.className = 'agent' + (i===0?' on':'');
    b.title = a.name;
    const dot = document.createElement('span');
    dot.className='dot';
    dot.style.background = `hsl(${a.hue*360} ${a.sat*100}% 60%)`;
    b.appendChild(dot);
    b.appendChild(document.createTextNode(a.name));
    b.style.display='flex'; b.style.alignItems='center'; b.style.gap='6px';
    b.addEventListener('click', ()=>{
      agentsEl.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
      b.classList.add('on'); window.orb.setAgent(key);
    });
    agentsEl.appendChild(b);
  });

  document.getElementById('hideBtn').addEventListener('click', ()=> hud.classList.add('hide'));
  document.getElementById('peek').addEventListener('click', ()=> hud.classList.remove('hide'));

  // =======================================================================
  // JARVIS bridge — connects to orb_bridge.py and drives window.orb from
  // real JARVIS state instead of the prototype HUD controls above
  // =======================================================================
  (function connectBridge(){
    function connect(){
      const ws = new WebSocket('ws://localhost:8765');
      ws.addEventListener('message', (ev) => {
        let msg;
        try { msg = JSON.parse(ev.data); } catch { return; }
        if(msg.type === 'energy'){
          liveMode = false;
          eBtns.forEach(b=>b.classList.remove('on'));
          window.orb.setEnergy(msg.value);
          slider.value = (+msg.value).toFixed(2);
        } else if(msg.type === 'agent'){
          window.orb.setAgent(msg.agent);
          agentsEl.querySelectorAll('button').forEach(b=>{
            b.classList.toggle('on', b.title.toLowerCase() === String(msg.agent).toLowerCase());
          });
        } else if(msg.type === 'hue'){
          window.orb.setHueSat(msg.h, msg.s);
        }
      });
      ws.addEventListener('close', () => setTimeout(connect, 1500));
      ws.addEventListener('error', () => ws.close());
    }
    connect();
  })();
})();
</script>
</body>
</html>
